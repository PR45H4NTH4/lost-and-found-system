spring.application.name=lost-and-found
server.port=8081

# H2 Database configuration (File-based to persist data across runs)
# spring.datasource.url=jdbc:h2:file:./data/lostandfound4;AUTO_SERVER=TRUE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Hibernate configuration
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (available at /h2-console)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.h2.console.settings.web-allow-others=true

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=uploads/

# Session management
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lost_and_found?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable Thymeleaf cache for development
spring.thymeleaf.cache=false
